# Netlify configuration.
# `netlify dev` serves the Astro site and the functions together on :8888.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  # Pinned port so we never collide with another local Astro project on 4321.
  command = "astro dev --port 4327"
  framework = "#custom"
  targetPort = 4327
  port = 8888

# The Stripe webhook needs the raw request body to verify the signature,
# so it must not be parsed/transformed. Netlify passes the raw body by default
# for functions; we read event.body verbatim in the handler.
